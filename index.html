<body>
  <div class="page">
    <div class="card" id="card">
      <!-- Hero image -->
      <div class="hero">
        <img src="images/hero.jpg" alt="Microtox Glass Skin treatment at Hairchitect">
      </div>

      <!-- STEP 1: Date selection -->
      <section class="content" id="step-date">
        <h1 class="title">Book your <span class="accent">Microtox Glass Skin</span> appointment at Hairchitect</h1>

        <div class="section">
          <h2 class="section-title">Date</h2>
          <div class="date-grid" id="date-grid"></div>
        </div>

        <p class="address">Daly City, CA</p>
      </section>

      <!-- STEP 2: Time selection -->
      <section class="content hidden" id="step-time">
        <button type="button" class="back-btn" data-back="date">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
          Back
        </button>
        <h1 class="title">Select your preferred time</h1>
        <p class="subtitle" id="time-summary"></p>

        <div class="time-block">
          <p class="time-label">Morning</p>
          <div class="time-grid" id="morning-grid"></div>
        </div>

        <div class="time-block">
          <p class="time-label">Afternoon</p>
          <div class="time-grid" id="afternoon-grid"></div>
        </div>
      </section>

      <!-- STEP 3: Customer details form -->
      <section class="content hidden" id="step-details">
        <button type="button" class="back-btn" data-back="time">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
          Back
        </button>
        <h1 class="title">Enter your details</h1>
        <p class="subtitle" id="details-summary"></p>

        <form id="details-form" class="form" autocomplete="on" novalidate>
          <label class="field">
            <span class="field-label">Name</span>
            <input type="text" name="name" id="name" placeholder="Full name" autocomplete="name" required>
          </label>
          <label class="field">
            <span class="field-label">Email</span>
            <input type="email" name="email" id="email" placeholder="name@example.com" autocomplete="email" required>
          </label>
          <label class="field">
            <span class="field-label">Phone</span>
            <input type="tel" name="phone" id="phone" placeholder="(123) 456-7890" autocomplete="tel" required>
          </label>

          <button type="submit" class="primary-btn" id="submit-btn">
            <span class="btn-label">Schedule Appointment</span>
            <span class="spinner hidden" aria-hidden="true"></span>
          </button>
          <p class="error-text hidden" id="error-text">Failed to book appointment</p>
        </form>
      </section>

      <!-- STEP 4: Confirmation -->
      <section class="content hidden confirmation" id="step-confirmed">
        <div class="success-icon" aria-hidden="true">
          <svg viewBox="0 0 80 80" width="80" height="80">
            <circle class="success-circle-bg" cx="40" cy="40" r="36" fill="none" stroke="currentColor" stroke-width="2" opacity="0.15"></circle>
            <circle class="success-circle" cx="40" cy="40" r="36" fill="none" stroke="currentColor" stroke-width="3"></circle>
            <path class="success-check" d="M24 40l10 10 22-22" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <h1 class="title center">You're all set!</h1>
        <p class="subtitle center">Your appointment has been booked successfully.</p>

        <div class="confirm-card" id="confirm-card"></div>

        <a class="primary-btn" id="gcal-link" target="_blank" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4"></path><path d="M8 2v4"></path><path d="M3 10h18"></path></svg>
          Add to Google Calendar
        </a>
        <button type="button" class="secondary-btn" id="reset-btn">Book Another Appointment</button>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
